<svg xmlns="http://www.w3.org/2000/svg" width="960" height="220" viewBox="0 0 960 220" role="img" aria-label="maestRoRun">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c0f"/>
      <stop offset="55%" stop-color="#15121f"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="960" height="220" rx="28" fill="url(#bg)"/>
  <rect width="960" height="220" rx="28" fill="url(#glow)"/>

  <circle cx="820" cy="42" r="72" fill="#7c3aed" opacity="0.12" filter="url(#soft)"/>
  <circle cx="120" cy="180" r="56" fill="#007aff" opacity="0.08" filter="url(#soft)"/>

  <g transform="translate(72, 58)">
    <rect x="0" y="0" width="72" height="72" rx="20" fill="rgba(124,58,237,0.16)" stroke="rgba(167,139,250,0.35)" stroke-width="1.5"/>
    <path d="M22 48 L36 18 L50 48 Z" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="36" cy="48" r="4" fill="#34c759"/>
    <path d="M30 38 H42" stroke="#64d2ff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text x="168" y="92" fill="#f7f7f8" font-family="Poppins, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="700" letter-spacing="-1.5">
    maest<tspan fill="#a78bfa">RoR</tspan>un
  </text>

  <text x="170" y="132" fill="#9ba3b1" font-family="Poppins, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="500">
    Local Maestro runner with dashboard, reports, and Slack alerts
  </text>

  <g transform="translate(170, 154)">
    <rect width="118" height="30" rx="15" fill="rgba(124,58,237,0.18)" stroke="rgba(167,139,250,0.28)"/>
    <text x="59" y="20" fill="#d8b4fe" font-family="Poppins, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Android · iOS · Node</text>
  </g>

  <rect x="760" y="154" width="128" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="760" y="154" width="92" height="8" rx="4" fill="url(#accent)"/>
  <text x="760" y="148" fill="#6e7681" font-family="Poppins, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600">Maestro flows</text>
</svg>
